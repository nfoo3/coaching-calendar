<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring 2026 · Historic Performance Assignment Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --engl:#3B82F6;--engl-bg:#0c1f3d;--engl-txt:#93c5fd;
  --coll:#10B981;--coll-bg:#052e1c;--coll-txt:#6ee7b7;
  --biz:#F59E0B;--biz-bg:#2d1a02;--biz-txt:#fcd34d;
  --bg:#0f172a;--surf:#1e293b;--surf2:#263550;
  --txt:#e2e8f0;--muted:#94a3b8;--border:#334155;
  --gold:#f59e0b;
  --sw:170px;--ww:220px;--hh:72px;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:14px;overflow:hidden}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:16px;z-index:100}
.hdr-title{font-size:19px;font-weight:800;white-space:nowrap}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.toggle-btn{background:var(--engl);color:#fff;border:none;border-radius:7px;padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
.toggle-btn:hover{filter:brightness(1.15)}
.toggle-btn.on{background:#7c3aed}
.legend{display:none;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.legend.show{display:flex}
.leg-ttl{font-weight:700;color:var(--txt);margin-right:2px}
.leg-item{display:flex;align-items:center;gap:4px;white-space:nowrap}
.leg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.leg-easy{background:#4ade80}.leg-mod{background:#facc15}.leg-hard{background:#fb923c}.leg-crit{background:#f87171}
.leg-sep{color:var(--border);margin:0 2px}
.leg-alert{display:flex;align-items:center;gap:4px;background:#450a0a;border:1px solid #ef4444;border-radius:4px;padding:2px 7px;font-size:10px;color:#fca5a5;white-space:nowrap}

/* ── Calendar outer ── */
.cal-outer{position:fixed;top:var(--hh);left:0;right:0;bottom:0;overflow:auto}
.cal-outer::-webkit-scrollbar{width:7px;height:7px}
.cal-outer::-webkit-scrollbar-track{background:var(--bg)}
.cal-outer::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.cal-outer::-webkit-scrollbar-thumb:hover{background:#475569}
.cal-outer::-webkit-scrollbar-corner{background:var(--bg)}

/* ── Grid ── */
.cal-grid{
  display:grid;
  grid-template-columns:var(--sw) repeat(11,var(--ww));
  min-width:calc(var(--sw) + 11*var(--ww));
}

/* Corner */
.g-corner{position:sticky;left:0;top:0;z-index:30;background:var(--surf);border-right:2px solid var(--border);border-bottom:2px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.g-corner-title{font-size:14px;font-weight:800}
.g-corner-sub{font-size:10px;color:var(--muted)}

/* Week header */
.g-wk{position:sticky;top:0;z-index:20;background:var(--surf);border-right:1px solid var(--border);border-bottom:2px solid var(--border);padding:8px 10px;text-align:center;transition:border-bottom-color .2s}
.g-wk.today{background:linear-gradient(135deg,#1c1714,#27200e);border-bottom-color:var(--gold)!important}
.g-wk.load-heavy{border-bottom-color:#ef4444}
.g-wk.load-mod{border-bottom-color:#f59e0b}
.wk-label{display:block;font-size:14px;font-weight:800;margin-bottom:1px}
.wk-dates{display:block;font-size:12px;color:var(--muted)}
.wk-today-badge{display:inline-block;background:var(--gold);color:#0f172a;font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
.wk-loadbar{height:3px;border-radius:2px;margin-top:5px;background:#1e293b;display:none}
body.coach .wk-loadbar{display:block}
.wk-loadbar.heavy{background:linear-gradient(90deg,#ef4444,#dc2626)}
.wk-loadbar.mod{background:linear-gradient(90deg,#f59e0b,#d97706)}
.wk-loadbar.light{background:#334155}

/* Course label */
.g-lbl{position:sticky;left:0;z-index:10;background:var(--surf);border-right:2px solid var(--border);border-bottom:1px solid var(--border);padding:12px 10px 12px 14px;display:flex;flex-direction:column;justify-content:center;gap:3px;min-height:130px}
.lbl-code{font-size:16px;font-weight:800}
.lbl-name{font-size:13px;color:var(--muted);line-height:1.3}

/* Assignment cell */
.g-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:7px;display:flex;flex-direction:column;gap:5px;min-height:130px;background:var(--bg);transition:background .2s}
.g-cell.today{background:#161109}
.g-cell.empty{background:var(--bg)}

/* Card */
.card{border-radius:6px;padding:6px 8px 6px 10px;font-size:12px;cursor:pointer;transition:transform .1s,box-shadow .1s;position:relative;border-left:3px solid transparent;line-height:1.35}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.45);z-index:5}
.card-name{font-weight:700;display:block;margin-bottom:2px}
.card-time{font-size:11px;opacity:.7;display:block}

/* Course card colors */
.c-engl125{background:var(--engl-bg);border-left-color:var(--engl);color:var(--engl-txt)}
.c-coll140{background:var(--coll-bg);border-left-color:var(--coll);color:var(--coll-txt)}
.c-biz{background:var(--biz-bg);border-left-color:var(--biz);color:var(--biz-txt)}
.c-special{background:#1e293b;border-left-color:#475569;color:#64748b;font-style:italic}

/* Coach view difficulty overlays */
body.coach .card:not(.c-special){border-left-width:4px}
body.coach .d-easy{background:rgba(74,222,128,.12);border-left-color:#4ade80}
body.coach .d-mod{background:rgba(250,204,21,.1);border-left-color:#facc15}
body.coach .d-hard{background:rgba(251,146,60,.13);border-left-color:#fb923c}
body.coach .d-crit{background:rgba(248,113,113,.15);border-left-color:#f87171}

/* Coach alert badge */
.alert-badge{display:none;position:absolute;top:-5px;right:-5px;background:#ef4444;color:#fff;font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px;z-index:6;white-space:nowrap;line-height:1.4}
body.coach .alert-badge{display:block}

/* Score chip in coach view */
.score-chip{display:none;font-size:10px;font-weight:700;margin-top:3px}
body.coach .score-chip{display:block}
.score-chip.d-easy{color:#4ade80}.score-chip.d-mod{color:#facc15}.score-chip.d-hard{color:#fb923c}.score-chip.d-crit{color:#f87171}

/* ── Modal ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal-box{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:500px;width:92%;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.55);max-height:90vh;overflow-y:auto}
.modal-x{position:absolute;top:12px;right:12px;background:var(--surf2);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;line-height:1;transition:color .15s}
.modal-x:hover{color:var(--txt)}
.modal-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;display:inline-block;margin-bottom:10px}
.modal-title{font-size:19px;font-weight:800;margin-bottom:5px;line-height:1.2}
.modal-due{font-size:12px;color:var(--muted);margin-bottom:14px}
.modal-alert{background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:8px 12px;font-size:12px;color:#fca5a5;margin-bottom:12px;display:none}
.modal-alert.show{display:block}
.modal-alert::before{content:'⚠ Coach Alert — Historical pass rate below 65%';display:block;font-weight:700;margin-bottom:2px}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--bg);border-radius:8px;padding:11px 13px}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:800;line-height:1}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px}
.stat-val.easy{color:#4ade80}.stat-val.mod{color:#facc15}.stat-val.hard{color:#fb923c}.stat-val.crit{color:#f87171}
.modal-nosubmit{background:var(--bg);border-radius:8px;padding:12px;font-size:12px;color:var(--muted);margin-bottom:14px}
.modal-note{background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px 13px;font-size:12px;color:#fde68a;line-height:1.55}
.modal-note-lbl{font-weight:700;display:block;margin-bottom:3px;color:#f59e0b}

/* ── Outreach templates (inside modal) ── */
.modal-outreach{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.outreach-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
.otab-bar{display:flex;gap:6px;margin-bottom:8px}
.otab{background:var(--surf2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.otab.active{background:var(--engl);border-color:var(--engl);color:#fff}
.otemplate-wrap{display:flex;flex-direction:column;gap:6px}
.otemplate-wrap.hidden{display:none}
.otemplate{width:100%;min-height:130px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--txt);font-size:11px;line-height:1.55;resize:vertical;font-family:inherit}
.ocopy-btn{align-self:flex-end;background:var(--surf2);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.ocopy-btn:hover{background:#334155}
.ocopy-btn.copied{background:#166534;border-color:#4ade80;color:#4ade80}

/* ── Reminders panel ── */
.remind-btn{background:var(--gold);color:#0f172a;border:none;border-radius:7px;padding:7px 15px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:filter .15s}
.remind-btn:hover{filter:brightness(1.12)}
.rp{position:fixed;top:var(--hh);right:0;bottom:0;width:380px;background:var(--surf);border-left:1px solid var(--border);z-index:90;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.rp.open{transform:translateX(0)}
.rp-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-hdr-title{font-size:14px;font-weight:800}
.rp-hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.rp-x{background:var(--surf2);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.rp-x:hover{color:var(--txt)}
.rp-body{flex:1;overflow-y:auto;padding:12px}
.rp-body::-webkit-scrollbar{width:5px}.rp-body::-webkit-scrollbar-track{background:transparent}.rp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.rp-section{margin-bottom:18px}
.rp-stitle{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rp-stitle.urgent{color:#f87171}
.rp-stitle.soon{color:#facc15}
.rp-stitle.risk{color:#fb923c}
.rp-count{background:var(--surf2);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;color:var(--muted)}
.rp-empty{font-size:13px;color:var(--muted);padding:6px 0;font-style:italic}
.rp-item{background:var(--bg);border-radius:8px;padding:12px 14px;margin-bottom:6px;border-left:3px solid var(--border);cursor:pointer;transition:border-color .15s}
.rp-item:hover{border-left-color:var(--gold)}
.rp-item.high{border-left-color:#f87171}
.rp-item.med{border-left-color:#fb923c}
.rp-item-name{font-size:14px;font-weight:700;margin-bottom:2px}
.rp-item-course{font-size:12px;font-weight:700;margin-bottom:3px}
.rp-item-meta{font-size:13px;color:var(--muted);line-height:1.4}
.rp-item-remind{font-size:12px;margin-top:4px;color:#facc15;font-weight:600}
.rp-copy-all{width:100%;margin-top:10px;background:var(--surf2);border:1px solid var(--border);color:var(--txt);border-radius:7px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.rp-copy-all:hover{background:#334155}
.rp-copy-all.copied{background:#166534;border-color:#4ade80;color:#4ade80}
.rp-divider{border:none;border-top:1px solid var(--border);margin:4px 0 12px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">Historic Performance Assignment Tracker</div>
    <div class="hdr-sub">Spring 2026 &nbsp;·&nbsp; 3 Courses &nbsp;·&nbsp; Apr 6 – Jun 21</div>
  </div>
  <div class="hdr-right">
    <div class="legend" id="legend">
      <span class="leg-ttl">Difficulty:</span>
      <div class="leg-item"><div class="leg-dot leg-easy"></div>Easy (≥85%)</div>
      <div class="leg-item"><div class="leg-dot leg-mod"></div>Moderate (75–84%)</div>
      <div class="leg-item"><div class="leg-dot leg-hard"></div>Hard (65–74%)</div>
      <div class="leg-item"><div class="leg-dot leg-crit"></div>Critical (&lt;65%)</div>
      <span class="leg-sep">|</span>
      <div class="leg-alert">⚠ Coach Alert = pass rate &lt;65%</div>
    </div>
    <button class="remind-btn" id="remindBtn" onclick="toggleRemindPanel()">📋 Reminders</button>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleView()">Switch to Coach View</button>
  </div>
</div>

<div class="rp" id="remindPanel">
  <div class="rp-hdr">
    <div>
      <div class="rp-hdr-title">Reminders &amp; Risk Report</div>
      <div class="rp-hdr-sub">Based on today · Apr 28, 2026</div>
    </div>
    <button class="rp-x" onclick="toggleRemindPanel()">&#215;</button>
  </div>
  <div class="rp-body" id="remindBody"></div>
</div>

<div class="cal-outer" id="calOuter">
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="modal-ov" id="modalOv" onclick="maybeClose(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-x" onclick="closeModal()">&#215;</button>
    <div id="modalBody"></div>
  </div>
</div>

// ── Utilities ──────────────────────────────────────────────
function weekOf(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  for (let i = 0; i < WEEKS.length; i++) {
    if (d >= new Date(WEEKS[i].start + 'T00:00:00') && d <= new Date(WEEKS[i].end + 'T23:59:59')) return i;
  }
  return -1;
}

function diff(score) {
  if (score === null) return '';
  if (score >= 85) return 'easy';
  if (score >= 75) return 'mod';
  if (score >= 65) return 'hard';
  return 'crit';
}

function diffLabel(d) { return {easy:'Easy',mod:'Moderate',hard:'Hard',crit:'Critical'}[d] || ''; }

function daysUntil(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
  return Math.round((d - t) / 86400000);
}

function reminderByDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - 3);
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
}

function outreachTemplates(a, course) {
  const days = daysUntil(a.due);
  const isHighRisk = a.pass !== null && a.pass < 65;
  const timing = days <= 0 ? 'TODAY' : days === 1 ? 'tomorrow' : `in ${days} days`;
  const shortDate = a.time.split('·')[0].trim();

  const standard = days <= 0
    ? `Hi [Student], just a heads up — ${a.name} for ${course.code} is due TODAY. Make sure to submit before the deadline, and let me know if you need any last-minute help!`
    : `Hi [Student], quick reminder that ${a.name} for ${course.code} is due ${timing} (${shortDate}). Please let me know if you need any guidance!`;

  const urgent = days <= 0
    ? `Hi [Student], ${a.name} for ${course.code} is due TODAY and this is one of the more challenging submissions. Please reach out right away if you're running into any issues — I want to make sure you get this in!`
    : `Hi [Student], just checking in — ${a.name} for ${course.code} is due ${timing} (${shortDate}). This one tends to be tricky, so please don't hesitate to reach out before the deadline. I'm here to help!`;

  return { standard, urgent };
}

// ── Build grid ─────────────────────────────────────────────
function build() {
  const grid = document.getElementById('calGrid');
  const todayWk = weekOf(TODAY.toISOString().split('T')[0]);

  // Bucket: byWC[weekIdx][courseIdx] = [assignments]
  const byWC = Array.from({length:11}, () => Array.from({length:3}, () => []));
  A.forEach(a => {
    const wi = weekOf(a.due);
    const ci = COURSES.findIndex(c => c.id === a.c);
    if (wi >= 0 && ci >= 0) byWC[wi][ci].push(a);
  });

  // Compute week load for coach bars
  const loads = WEEKS.map((_, wi) => {
    let n = 0, crit = 0;
    for (let ci = 0; ci < 3; ci++) {
      byWC[wi][ci].forEach(a => {
        n++;
        if (a.pass !== null && a.pass < 65) crit++;
        if (a.score !== null && a.score < 65) crit++;
      });
    }
    if (n >= 7 || crit >= 3) return 'heavy';
    if (n >= 4 || crit >= 1) return 'mod';
    return 'light';
  });

  // Row 0: corner + week headers
  const corner = el('div', 'g-corner', `<span class="g-corner-title">Courses</span><span class="g-corner-sub">Spring 2026</span>`);
  grid.appendChild(corner);

  WEEKS.forEach((wk, wi) => {
    const isToday = wi === todayWk;
    const ld = loads[wi];
    const cell = el('div', `g-wk${isToday?' today':''}${!isToday && ld==='heavy'?' load-heavy':!isToday && ld==='mod'?' load-mod':''}`, `
      <span class="wk-label">${wk.label}</span>
      <span class="wk-dates">${wk.range}</span>
      ${isToday ? '<span class="wk-today-badge">← Today</span>' : ''}
      <div class="wk-loadbar ${ld}" id="lb${wi}"></div>
    `);
    grid.appendChild(cell);
  });

  // Rows 1–3: label + cells
  COURSES.forEach((course, ci) => {
    const lbl = el('div', 'g-lbl', `
      <span class="lbl-code" style="color:${course.color}">${course.code}</span>
      <span class="lbl-name">${course.name}</span>
    `);
    lbl.style.borderLeft = `4px solid ${course.color}`;
    grid.appendChild(lbl);

    WEEKS.forEach((_, wi) => {
      const isToday = wi === todayWk;
      const assignments = byWC[wi][ci];
      const cell = el('div', `g-cell${isToday?' today':''}${assignments.length===0?' empty':''}`);

      assignments.forEach(a => {
        const dc = diff(a.score);
        const isAlert = a.pass !== null && a.pass < 65;
        const isSpecial = a.score === null;
        const card = el('div',
          `card ${isSpecial ? 'c-special' : `c-${a.c} d-${dc}`}`,
          `${isAlert ? '<span class="alert-badge">⚠ Alert</span>' : ''}
           <span class="card-name">${a.name}</span>
           <span class="card-time">${a.time}</span>
           ${!isSpecial ? `<span class="score-chip d-${dc}">Avg ${a.score}% · Pass ${a.pass}%</span>` : ''}`
        );
        card.addEventListener('click', () => openModal(a, course));
        cell.appendChild(card);
      });

      grid.appendChild(cell);
    });
  });
}

function el(tag, cls, html = '') {
  const e = document.createElement(tag);
  e.className = cls;
  e.innerHTML = html;
  return e;
}

// ── Modal ──────────────────────────────────────────────────
let _tpl = {email:'', sms:''};

function openModal(a, course) {
  const dc = diff(a.score);
  const isAlert = a.pass !== null && a.pass < 65;
  const isSpecial = a.score === null;
  const showOutreach = !isSpecial && daysUntil(a.due) >= 0;

  if (showOutreach) _tpl = outreachTemplates(a, course);

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-badge" style="background:${course.color}22;color:${course.color};border:1px solid ${course.color}44">${course.code}</div>
    <div class="modal-title">${a.name}</div>
    <div class="modal-due">Due: ${a.time}</div>
    <div class="modal-alert ${isAlert ? 'show' : ''}"></div>
    ${isSpecial
      ? `<div class="modal-nosubmit">No graded submission this week.</div>`
      : `<div class="modal-stats">
           <div class="stat-box">
             <div class="stat-lbl">Historical Avg Score</div>
             <div class="stat-val ${dc}">${a.score}%</div>
             <div class="stat-sub">${diffLabel(dc)} difficulty</div>
           </div>
           <div class="stat-box">
             <div class="stat-lbl">Historical Pass Rate</div>
             <div class="stat-val ${isAlert ? 'crit' : dc}">${a.pass}%</div>
             <div class="stat-sub">${isAlert ? '⚠ Below 65% threshold' : 'Within range'}</div>
           </div>
         </div>`
    }
    <div class="modal-note"><span class="modal-note-lbl">📋 Coach Note</span>${a.note}</div>
    ${showOutreach ? `
    <div class="modal-outreach">
      <div class="outreach-lbl">💬 DM Template</div>
      <div class="otab-bar">
        <button class="otab active" id="otab-email" onclick="showOTab('email')">Standard</button>
        <button class="otab" id="otab-sms" onclick="showOTab('sms')">Urgent</button>
      </div>
      <div class="otemplate-wrap" id="otemplate-email">
        <textarea class="otemplate" id="ota-email" readonly></textarea>
        <button class="ocopy-btn" id="ocopy-email" onclick="copyOutreach('email')">Copy</button>
      </div>
      <div class="otemplate-wrap hidden" id="otemplate-sms">
        <textarea class="otemplate" id="ota-sms" readonly></textarea>
        <button class="ocopy-btn" id="ocopy-sms" onclick="copyOutreach('sms')">Copy</button>
      </div>
    </div>` : ''}
  `;

  if (showOutreach) {
    document.getElementById('ota-email').value = _tpl.standard;
    document.getElementById('ota-sms').value = _tpl.urgent;
  }
  document.getElementById('modalOv').classList.add('open');
}

function showOTab(tab) {
  ['email','sms'].forEach(t => {
    document.getElementById(`otab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`otemplate-${t}`).classList.toggle('hidden', t !== tab);
  });
}

function copyOutreach(which) {
  navigator.clipboard.writeText(which === 'email' ? _tpl.standard : _tpl.urgent).then(() => {
    const btn = document.getElementById(`ocopy-${which}`);
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function closeModal() { document.getElementById('modalOv').classList.remove('open'); }
function maybeClose(e) { if (e.target === document.getElementById('modalOv')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── View toggle ────────────────────────────────────────────
let coachOn = false;
function toggleView() {
  coachOn = !coachOn;
  document.body.classList.toggle('coach', coachOn);
  const btn = document.getElementById('toggleBtn');
  btn.textContent = coachOn ? 'Switch to Student View' : 'Switch to Coach View';
  btn.classList.toggle('on', coachOn);
  document.getElementById('legend').classList.toggle('show', coachOn);
}

// ── Reminders panel ───────────────────────────────────────
let remindOpen = false;
let _bulkText = '';

function toggleRemindPanel() {
  remindOpen = !remindOpen;
  document.getElementById('remindPanel').classList.toggle('open', remindOpen);
  if (remindOpen) buildRemindPanel();
}

function buildRemindPanel() {
  const byCourseThenDate = (x, y) => {
    const ci = COURSES.findIndex(c => c.id === x.c) - COURSES.findIndex(c => c.id === y.c);
    return ci !== 0 ? ci : new Date(x.due) - new Date(y.due);
  };
  const future = A.filter(a => a.score !== null && daysUntil(a.due) >= 0);
  const actionNow = future.filter(a => daysUntil(a.due) <= 3).sort(byCourseThenDate);
  const soonItems = future.filter(a => daysUntil(a.due) >= 4 && daysUntil(a.due) <= 7).sort(byCourseThenDate);
  const riskItems = A.filter(a => a.score !== null && daysUntil(a.due) >= 1 && daysUntil(a.due) <= 14 && (a.pass < 65 || a.score < 65)).sort(byCourseThenDate);

  _bulkText = `2-Week Risk Assignments — as of ${TODAY.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}\n${'─'.repeat(48)}\n\n` +
    riskItems.map(a => {
      const course = COURSES.find(c => c.id === a.c);
      return `⚠ ${course.code} — ${a.name}\n   Due: ${a.time}\n   Historical pass rate: ${a.pass}% | Avg score: ${a.score}%\n   → Send reminder by: ${reminderByDate(a.due)}`;
    }).join('\n\n');

  const sec = (title, cls, items, emptyMsg) => {
    let h = `<div class="rp-section"><div class="rp-stitle ${cls}">${title} <span class="rp-count">${items.length}</span></div>`;
    if (!items.length) { h += `<div class="rp-empty">${emptyMsg}</div>`; }
    else items.forEach(a => { h += rpItem(a, cls === 'urgent' || cls === 'risk' ? 'high' : 'med'); });
    return h + '</div>';
  };

  document.getElementById('remindBody').innerHTML =
    sec('⚡ Send Reminder Now', 'urgent', actionNow, 'No assignments due in the next 3 days.') +
    sec('📅 Coming Up This Week', 'soon', soonItems, 'No assignments due in 4–7 days.') +
    riskSec(riskItems);
}

function rpItem(a, urgency) {
  const course = COURSES.find(c => c.id === a.c);
  const days = daysUntil(a.due);
  const dayLabel = days === 0 ? 'Due TODAY' : days === 1 ? 'Due tomorrow' : `Due in ${days} days`;
  const isHigh = a.pass < 65;
  return `<div class="rp-item ${isHigh ? 'high' : 'med'}" data-aid="${a.id}" onclick="rpOpenModal(this.dataset.aid)">
    <div class="rp-item-course" style="color:${course.color}">${course.code}</div>
    <div class="rp-item-name">${a.name}</div>
    <div class="rp-item-meta">${a.time}${isHigh ? ` · <span style="color:#f87171">Pass rate: ${a.pass}%</span>` : ` · Pass rate: ${a.pass}%`}</div>
    <div class="rp-item-remind">⏰ ${dayLabel} · Reminder due: ${reminderByDate(a.due)}</div>
  </div>`;
}

function rpOpenModal(aid) {
  const a = A.find(x => x.id === aid);
  const course = COURSES.find(c => c.id === a.c);
  openModal(a, course);
}

function riskSec(items) {
  let h = `<div class="rp-section"><div class="rp-stitle risk">⚠ 2-Week Risk Report <span class="rp-count">${items.length} high-risk</span></div>`;
  if (!items.length) { h += `<div class="rp-empty">No high-risk assignments in the next 14 days.</div>`; }
  else {
    items.forEach(a => { h += rpItem(a, 'high'); });
    h += `<button class="rp-copy-all" id="rpCopyAll" onclick="doCopyAll()">Copy Full List as Text</button>`;
  }
  return h + '</div>';
}

function doCopyAll() {
  navigator.clipboard.writeText(_bulkText).then(() => {
    const btn = document.getElementById('rpCopyAll');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Full List as Text'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Init ───────────────────────────────────────────────────
build();

// Scroll so Week 4 (today) is the first visible week after the sidebar
setTimeout(() => {
  const WW = 220; // --ww
  const todayWk = weekOf(TODAY.toISOString().split('T')[0]);
  // scroll = todayWkIndex * WW puts today-week right at left edge after sticky sidebar
  document.getElementById('calOuter').scrollLeft = Math.max(0, (todayWk - 0.3) * WW);
}, 80);
</script>
